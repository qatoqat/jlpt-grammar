<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT Grammar Tree</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>JLPT Grammar Tree</h1>
        <div class="level-pills">
            <button class="pill active" onclick="switchLevel('n5', '#27AE60')">N5</button>
            <button class="pill" onclick="switchLevel('n4', '#2980B9')">N4</button>
            <button class="pill" onclick="switchLevel('n3', '#8E44AD')">N3</button>
            <button class="pill" onclick="switchLevel('n2', '#D35400')">N2</button>
            <button class="pill" onclick="switchLevel('n1', '#C0392B')">N1</button>
        </div>
        <div id="progress-counter" class="progress-counter"></div>
    </header>

    <main class="container">
        <div class="tree-line"></div>
        <!-- Content will be injected here via JS -->
        <div id="content-area"></div>
    </main>

    <footer>
        <p>JLPT Grammar Tree &copy; <span id="year"></span></p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
